services:
  # Servicio para Laravel (PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-formulario-app
    container_name: app-formulario
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html

  # Servicio para Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx-formulario
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # Servicio para la Base de Datos
  db:
    image: mysql:8.0
    container_name: mysql-formulario
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
